name: Build Push Deploy to GKE

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_failover:
        description: "Force run failover deployment even if primary job succeeds"
        required: false
        default: false
        type: boolean
      promote_failover_db:
        description: "Promote failover Cloud SQL replica to writable before failover rollout"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  BACKEND_IMAGE_NAME: apsas-backend
  FRONTEND_IMAGE_NAME: apsas-frontend
  GKE_PRIMARY_CLUSTER: ${{ vars.GKE_PRIMARY_CLUSTER }}
  GKE_PRIMARY_LOCATION: ${{ vars.GKE_PRIMARY_LOCATION }}
  GKE_FAILOVER_CLUSTER: ${{ vars.GKE_FAILOVER_CLUSTER }}
  GKE_FAILOVER_LOCATION: ${{ vars.GKE_FAILOVER_LOCATION }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
  BACKEND_SECRET_NAME: ${{ vars.BACKEND_SECRET_NAME }}
  FRONTEND_SECRET_NAME: ${{ vars.FRONTEND_SECRET_NAME }}
  FAILOVER_SQL_INSTANCE: ${{ vars.FAILOVER_SQL_INSTANCE }}

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: "[Prep] Checkout"
        uses: actions/checkout@v4

      - name: "[Build] Set up Java"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: "[Build] Build backend JAR"
        run: mvn -B -DskipTests package -f APSAS_BE/pom.xml

      - name: "[Build] Set up Node"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: APSAS_FE/package-lock.json

      - name: "[Build] Build frontend bundle"
        run: |
          cd APSAS_FE
          npm ci
          npm run build

      - name: "[Artifacts] Upload backend artifact"
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: APSAS_BE/target/*.jar

      - name: "[Artifacts] Upload frontend artifact"
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: APSAS_FE/dist

  publish-images:
    needs: build-artifacts
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.backend-image.outputs.backend_image }}
      frontend_image: ${{ steps.frontend-image.outputs.frontend_image }}
    steps:
      - name: "[Prep] Checkout"
        uses: actions/checkout@v4

      - name: "[Auth] Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: "[Auth] Set up gcloud"
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: "[Auth] Enable GKE auth plugin"
        run: |
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> "$GITHUB_ENV"
          gke-gcloud-auth-plugin --version

      - name: "[Images] Configure Docker auth"
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: "[Images] Build and push backend image"
        id: backend-image
        run: |
          BACKEND_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}"
          BACKEND_IMAGE_LATEST="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${BACKEND_IMAGE_NAME}:latest"
          docker build -t "$BACKEND_IMAGE" APSAS_BE
          docker push "$BACKEND_IMAGE"
          docker tag "$BACKEND_IMAGE" "$BACKEND_IMAGE_LATEST"
          docker push "$BACKEND_IMAGE_LATEST"
          echo "backend_image=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"

      - name: "[Images] Verify backend image pull"
        run: docker pull "${{ steps.backend-image.outputs.backend_image }}"

      - name: "[Images] Build and push frontend image"
        id: frontend-image
        run: |
          FRONTEND_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}"
          FRONTEND_IMAGE_LATEST="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${FRONTEND_IMAGE_NAME}:latest"
          docker build -t "$FRONTEND_IMAGE" APSAS_FE
          docker push "$FRONTEND_IMAGE"
          docker tag "$FRONTEND_IMAGE" "$FRONTEND_IMAGE_LATEST"
          docker push "$FRONTEND_IMAGE_LATEST"
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"

      - name: "[Images] Verify frontend image pull"
        run: docker pull "${{ steps.frontend-image.outputs.frontend_image }}"

  render-manifests:
    needs: publish-images
    runs-on: ubuntu-latest
    steps:
      - name: "[Prep] Checkout"
        uses: actions/checkout@v4

      - name: "[Deploy] Render Kubernetes manifests"
        run: |
          mkdir -p rendered
          cp infrastructures/modules/security_and_ci/k8s/*.yaml rendered/

          for f in rendered/*.yaml; do
            sed -i "s|__NAMESPACE__|${K8S_NAMESPACE}|g" "$f"
            sed -i "s|__BACKEND_SECRET__|${BACKEND_SECRET_NAME}|g" "$f"
            sed -i "s|__FRONTEND_SECRET__|${FRONTEND_SECRET_NAME}|g" "$f"
            sed -i "s|__BACKEND_IMAGE__|${{ needs.publish-images.outputs.backend_image }}|g" "$f"
            sed -i "s|__FRONTEND_IMAGE__|${{ needs.publish-images.outputs.frontend_image }}|g" "$f"
          done

      - name: "[Deploy] Upload rendered manifests"
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manifests
          path: rendered/*.yaml

  deploy-primary:
    needs: [publish-images, render-manifests]
    runs-on: ubuntu-latest
    steps:
      - name: "[Auth] Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: "[Auth] Set up gcloud"
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: "[Auth] Enable GKE auth plugin"
        run: |
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> "$GITHUB_ENV"
          gke-gcloud-auth-plugin --version

      - name: "[Deploy:Primary] Download rendered manifests"
        uses: actions/download-artifact@v4
        with:
          name: rendered-manifests
          path: rendered

      - name: "[Deploy:Primary] Get cluster credentials"
        run: |
          gcloud container clusters get-credentials "$GKE_PRIMARY_CLUSTER" --location "$GKE_PRIMARY_LOCATION" --project "$GCP_PROJECT_ID"

      - name: "[Deploy:Primary] Apply manifests"
        run: |
          kubectl apply --validate=false -f rendered/

      - name: "[Deploy:Primary] Rollout backend"
        id: primary-backend-rollout
        run: |
          echo "failed=false" >> "$GITHUB_OUTPUT"
          set +e
          kubectl rollout status deployment/apsas-backend -n "$K8S_NAMESPACE" --timeout=600s
          status=$?

          if [ $status -ne 0 ]; then
            echo "Primary backend rollout timed out. Cleaning old ReplicaSet pods then retrying..."

            newest_rs=$(kubectl get rs -n "$K8S_NAMESPACE" -l app=apsas-backend --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1:].metadata.name}')
            echo "Newest ReplicaSet: $newest_rs"

            old_rs_pods=$(kubectl get pods -n "$K8S_NAMESPACE" -l app=apsas-backend -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.metadata.ownerReferences[0].name}{"\n"}{end}' | awk -v rs="$newest_rs" '$2 != rs {print $1}')

            if [ -n "$old_rs_pods" ]; then
              echo "$old_rs_pods" | while IFS= read -r pod; do
                [ -z "$pod" ] && continue
                kubectl delete pod "$pod" -n "$K8S_NAMESPACE" --grace-period=0 --force || true
              done
            fi

            kubectl rollout status deployment/apsas-backend -n "$K8S_NAMESPACE" --timeout=300s
            retry_status=$?

            if [ $retry_status -ne 0 ]; then
              desired=$(kubectl get deployment apsas-backend -n "$K8S_NAMESPACE" -o jsonpath='{.spec.replicas}' 2>/dev/null)
              updated=$(kubectl get deployment apsas-backend -n "$K8S_NAMESPACE" -o jsonpath='{.status.updatedReplicas}' 2>/dev/null)
              available=$(kubectl get deployment apsas-backend -n "$K8S_NAMESPACE" -o jsonpath='{.status.availableReplicas}' 2>/dev/null)

              desired=${desired:-0}
              updated=${updated:-0}
              available=${available:-0}

              echo "Rollout still not complete. desired=$desired updated=$updated available=$available"

              # Avoid failing the whole pipeline if deployment is already serving traffic.
              if [ "$available" -ge 1 ] && [ "$updated" -ge 1 ]; then
                echo "Deployment has available updated replicas. Continue pipeline."
                retry_status=0
              fi
              status=$retry_status
            fi
          fi

          if [ $status -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: "[Deploy:Primary] Diagnostics backend"
        if: steps.primary-backend-rollout.outputs.failed == 'true'
        run: |
          kubectl describe deployment apsas-backend -n "$K8S_NAMESPACE" || true
          kubectl get pods -n "$K8S_NAMESPACE" -l app=apsas-backend -o wide || true
          kubectl describe pods -n "$K8S_NAMESPACE" -l app=apsas-backend || true
          kubectl logs -n "$K8S_NAMESPACE" -l app=apsas-backend --all-containers --tail=300 || true
          kubectl logs -n "$K8S_NAMESPACE" -l app=apsas-backend --all-containers --tail=300 --previous || true
          kubectl get events -n "$K8S_NAMESPACE" --sort-by=.metadata.creationTimestamp | tail -n 100 || true

      - name: "[Deploy:Primary] Fail if backend rollout failed"
        if: steps.primary-backend-rollout.outputs.failed == 'true'
        run: exit 1

      - name: "[Deploy:Primary] Rollout frontend"
        id: primary-frontend-rollout
        run: |
          echo "failed=false" >> "$GITHUB_OUTPUT"
          set +e
          kubectl rollout status deployment/apsas-frontend -n "$K8S_NAMESPACE" --timeout=900s
          status=$?
          if [ $status -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: "[Deploy:Primary] Diagnostics frontend"
        if: steps.primary-frontend-rollout.outputs.failed == 'true'
        run: |
          kubectl describe deployment apsas-frontend -n "$K8S_NAMESPACE" || true
          kubectl get pods -n "$K8S_NAMESPACE" -l app=apsas-frontend -o wide || true
          kubectl describe pods -n "$K8S_NAMESPACE" -l app=apsas-frontend || true
          kubectl logs -n "$K8S_NAMESPACE" -l app=apsas-frontend --all-containers --tail=300 || true
          kubectl logs -n "$K8S_NAMESPACE" -l app=apsas-frontend --all-containers --tail=300 --previous || true
          kubectl get events -n "$K8S_NAMESPACE" --sort-by=.metadata.creationTimestamp | tail -n 100 || true

      - name: "[Deploy:Primary] Fail if frontend rollout failed"
        if: steps.primary-frontend-rollout.outputs.failed == 'true'
        run: exit 1

      - name: "[Deploy:Primary] Sync MCI health check path"
        run: |
          set +e
          HC_NAME=$(kubectl get multiclusteringress.networking.gke.io apsas-backend-mci -n "$K8S_NAMESPACE" -o jsonpath='{.status.CloudResources.HealthChecks[0]}' 2>/dev/null)

          if [ -z "$HC_NAME" ]; then
            echo "MCI health check not found yet, skipping sync."
            exit 0
          fi

          echo "Updating health check $HC_NAME to /api/healthz"
          gcloud compute health-checks update http "$HC_NAME" \
            --global \
            --project "$GCP_PROJECT_ID" \
            --request-path=/api/healthz \
            --check-interval=10s \
            --timeout=5s \
            --healthy-threshold=1 \
            --unhealthy-threshold=3

          gcloud compute health-checks describe "$HC_NAME" --global --project "$GCP_PROJECT_ID" | grep -E 'requestPath|checkIntervalSec|timeoutSec|healthyThreshold|unhealthyThreshold' || true

  deploy-failover:
    needs: [publish-images, render-manifests, deploy-primary]
    if: ${{ always() && vars.GKE_FAILOVER_CLUSTER != '' && vars.GKE_FAILOVER_LOCATION != '' && (needs.deploy-primary.result != 'success' || (github.event_name == 'workflow_dispatch' && inputs.force_failover == true)) }}
    runs-on: ubuntu-latest
    steps:
      - name: "[Auth] Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: "[Auth] Set up gcloud"
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: "[Auth] Enable GKE auth plugin"
        run: |
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> "$GITHUB_ENV"
          gke-gcloud-auth-plugin --version

      - name: "[Failover] Promote Cloud SQL replica"
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.promote_failover_db == true }}
        run: |
          set -euo pipefail

          INSTANCE="${FAILOVER_SQL_INSTANCE:-}"
          if [ -z "$INSTANCE" ]; then
            INSTANCE=$(gcloud sql instances list \
              --project "$GCP_PROJECT_ID" \
              --filter="region:${GKE_FAILOVER_LOCATION} AND name~'-failover-mysql-replica$'" \
              --format='value(name)' | head -n 1)
          fi

          if [ -z "$INSTANCE" ]; then
            echo "No failover SQL instance found. Set repo variable FAILOVER_SQL_INSTANCE."
            exit 1
          fi

          echo "Selected failover SQL instance: $INSTANCE"

          MASTER=$(gcloud sql instances describe "$INSTANCE" \
            --project "$GCP_PROJECT_ID" \
            --format='value(masterInstanceName)')

          if [ -z "$MASTER" ]; then
            echo "Instance is already writable (not a replica)."
            exit 0
          fi

          echo "Promoting replica '$INSTANCE' (master: $MASTER) to writable..."
          OPERATION=$(gcloud sql instances promote-replica "$INSTANCE" \
            --project "$GCP_PROJECT_ID" \
            --quiet \
            --format='value(name)')

          gcloud sql operations wait "$OPERATION" --project "$GCP_PROJECT_ID" --timeout=1800

          STATE=$(gcloud sql instances describe "$INSTANCE" \
            --project "$GCP_PROJECT_ID" \
            --format='value(state)')
          MASTER_AFTER=$(gcloud sql instances describe "$INSTANCE" \
            --project "$GCP_PROJECT_ID" \
            --format='value(masterInstanceName)')

          echo "Post-promotion state: state=$STATE masterInstanceName=${MASTER_AFTER:-<empty>}"

          if [ "$STATE" != "RUNNABLE" ] || [ -n "$MASTER_AFTER" ]; then
            echo "Failover SQL instance is not ready as writable primary."
            exit 1
          fi

      - name: "[Deploy:Failover] Download rendered manifests"
        uses: actions/download-artifact@v4
        with:
          name: rendered-manifests
          path: rendered

      - name: "[Deploy:Failover] Get cluster credentials"
        run: |
          gcloud container clusters get-credentials "$GKE_FAILOVER_CLUSTER" --location "$GKE_FAILOVER_LOCATION" --project "$GCP_PROJECT_ID"

      - name: "[Deploy:Failover] Apply manifests"
        run: |
          kubectl apply --validate=false -f rendered/

      - name: "[Deploy:Failover] Rollout backend"
        id: failover-backend-rollout
        continue-on-error: true
        run: |
          set +e
          kubectl rollout status deployment/apsas-backend -n "$K8S_NAMESPACE" --timeout=600s
          status=$?

          if [ $status -ne 0 ]; then
            echo "Failover backend rollout timed out. Cleaning old ReplicaSet pods then retrying..."

            newest_rs=$(kubectl get rs -n "$K8S_NAMESPACE" -l app=apsas-backend --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1:].metadata.name}')
            echo "Newest ReplicaSet: $newest_rs"

            old_rs_pods=$(kubectl get pods -n "$K8S_NAMESPACE" -l app=apsas-backend -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.metadata.ownerReferences[0].name}{"\n"}{end}' | awk -v rs="$newest_rs" '$2 != rs {print $1}')

            if [ -n "$old_rs_pods" ]; then
              echo "$old_rs_pods" | while IFS= read -r pod; do
                [ -z "$pod" ] && continue
                kubectl delete pod "$pod" -n "$K8S_NAMESPACE" --grace-period=0 --force || true
              done
            fi

            kubectl rollout status deployment/apsas-backend -n "$K8S_NAMESPACE" --timeout=300s
          fi

      - name: "[Deploy:Failover] Diagnostics backend"
        if: steps.failover-backend-rollout.outcome == 'failure'
        run: |
          kubectl describe deployment apsas-backend -n "$K8S_NAMESPACE" || true
          kubectl get pods -n "$K8S_NAMESPACE" -l app=apsas-backend -o wide || true
          kubectl describe pods -n "$K8S_NAMESPACE" -l app=apsas-backend || true
          kubectl logs -n "$K8S_NAMESPACE" -l app=apsas-backend --all-containers --tail=300 || true
          kubectl logs -n "$K8S_NAMESPACE" -l app=apsas-backend --all-containers --tail=300 --previous || true
          kubectl get events -n "$K8S_NAMESPACE" --sort-by=.metadata.creationTimestamp | tail -n 100 || true

      - name: "[Deploy:Failover] Fail if backend rollout failed"
        if: steps.failover-backend-rollout.outcome == 'failure'
        run: exit 1

      - name: "[Deploy:Failover] Rollout frontend"
        id: failover-frontend-rollout
        continue-on-error: true
        run: kubectl rollout status deployment/apsas-frontend -n "$K8S_NAMESPACE" --timeout=900s

      - name: "[Deploy:Failover] Diagnostics frontend"
        if: steps.failover-frontend-rollout.outcome == 'failure'
        run: |
          kubectl describe deployment apsas-frontend -n "$K8S_NAMESPACE" || true
          kubectl get pods -n "$K8S_NAMESPACE" -l app=apsas-frontend -o wide || true
          kubectl describe pods -n "$K8S_NAMESPACE" -l app=apsas-frontend || true
          kubectl logs -n "$K8S_NAMESPACE" -l app=apsas-frontend --all-containers --tail=300 || true
          kubectl logs -n "$K8S_NAMESPACE" -l app=apsas-frontend --all-containers --tail=300 --previous || true
          kubectl get events -n "$K8S_NAMESPACE" --sort-by=.metadata.creationTimestamp | tail -n 100 || true

      - name: "[Deploy:Failover] Fail if frontend rollout failed"
        if: steps.failover-frontend-rollout.outcome == 'failure'
        run: exit 1

      - name: "[Deploy:Failover] Sync MCI health check path"
        run: |
          set +e
          HC_NAME=$(kubectl get multiclusteringress.networking.gke.io apsas-backend-mci -n "$K8S_NAMESPACE" -o jsonpath='{.status.CloudResources.HealthChecks[0]}' 2>/dev/null)

          if [ -z "$HC_NAME" ]; then
            echo "MCI health check not found yet, skipping sync."
            exit 0
          fi

          echo "Updating health check $HC_NAME to /api/healthz"
          gcloud compute health-checks update http "$HC_NAME" \
            --global \
            --project "$GCP_PROJECT_ID" \
            --request-path=/api/healthz \
            --check-interval=10s \
            --timeout=5s \
            --healthy-threshold=1 \
            --unhealthy-threshold=3

          gcloud compute health-checks describe "$HC_NAME" --global --project "$GCP_PROJECT_ID" | grep -E 'requestPath|checkIntervalSec|timeoutSec|healthyThreshold|unhealthyThreshold' || true
