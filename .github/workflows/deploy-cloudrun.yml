name: Deploy Cloud Run Multi-Region

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-cloudrun-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  PRIMARY_REGION: europe-west4
  SECONDARY_REGION: asia-east1
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
  BACKEND_SERVICE_NAME: apsas-backend
  FRONTEND_SERVICE_NAME: apsas-frontend

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Auth to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.PRIMARY_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $PRIMARY_REGION-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          docker build -t $PRIMARY_REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-backend:$IMAGE_TAG APSAS_BE
          docker push $PRIMARY_REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-backend:$IMAGE_TAG

      - name: Build and push frontend image
        run: |
          docker build -t $PRIMARY_REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-frontend:$IMAGE_TAG APSAS_FE
          docker push $PRIMARY_REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-frontend:$IMAGE_TAG

      - name: Deploy backend primary
        run: |
          gcloud run services update ${BACKEND_SERVICE_NAME}-primary \
            --project=$PROJECT_ID \
            --region=$PRIMARY_REGION \
            --image=$PRIMARY_REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-backend:$IMAGE_TAG

      - name: Deploy backend failover
        run: |
          gcloud run services update ${BACKEND_SERVICE_NAME}-failover \
            --project=$PROJECT_ID \
            --region=$SECONDARY_REGION \
            --image=$PRIMARY_REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-backend:$IMAGE_TAG

      - name: Deploy frontend primary
        run: |
          gcloud run services update ${FRONTEND_SERVICE_NAME}-primary \
            --project=$PROJECT_ID \
            --region=$PRIMARY_REGION \
            --image=$PRIMARY_REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-frontend:$IMAGE_TAG

      - name: Deploy frontend failover
        run: |
          gcloud run services update ${FRONTEND_SERVICE_NAME}-failover \
            --project=$PROJECT_ID \
            --region=$SECONDARY_REGION \
            --image=$PRIMARY_REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-frontend:$IMAGE_TAG

      - name: Smoke test frontend
        run: |
          curl -fsS "http://34.160.100.91/" > /dev/null

      - name: Smoke test backend health
        run: |
          curl -fsS "http://34.160.100.91/api/healthz" > /dev/null
