name: Deploy Cloud Run Multi-Region

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west4
  TF_DIR: infrastructures/environments/prod
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Auth to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-backend:$IMAGE_TAG APSAS_BE
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-backend:$IMAGE_TAG

      - name: Build and push frontend image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-frontend:$IMAGE_TAG APSAS_FE
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-frontend:$IMAGE_TAG

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -upgrade

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="project_id=$PROJECT_ID" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="backend_image=$REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-backend:$IMAGE_TAG" \
            -var="frontend_image=$REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-frontend:$IMAGE_TAG"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="project_id=$PROJECT_ID" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="backend_image=$REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-backend:$IMAGE_TAG" \
            -var="frontend_image=$REGION-docker.pkg.dev/$PROJECT_ID/apsas-apps/apsas-frontend:$IMAGE_TAG"

      - name: Smoke test frontend
        working-directory: ${{ env.TF_DIR }}
        run: |
          LB_IP=$(terraform output -raw global_lb_ip)
          curl -fsS "http://${LB_IP}/" > /dev/null

      - name: Smoke test backend health
        working-directory: ${{ env.TF_DIR }}
        run: |
          LB_IP=$(terraform output -raw global_lb_ip)
          curl -fsS "http://${LB_IP}/api/healthz" > /dev/null
