  api-key: ${API_KEY_BREVO}
  template-id: 3
  sender:
    mail: nguyentrongduc447@gmail.com
    name: CodeVerse
jubge:
  base-url: https://ce.judge0.com

mvc:
  throw-exception-if-no-handler-found: true

web:
  resources:
    add-mappings: false

app:
  name: CodeVerse
  kafka:
    topic:
      verify-email: verify-email
