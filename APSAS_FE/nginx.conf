server {
    listen 80;
    server_name localhost;

    # Frontend gọi /api cùng origin, Nginx sẽ chuyển tiếp vào backend service nội bộ của Kubernetes.
    location /api/ {
        proxy_pass http://apsas-backend.apsas.svc.cluster.local/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # Dòng này là "phép thuật" cho React Router:
        # Nếu không tìm thấy file thật, hãy đẩy người dùng về index.html để React tự xử lý
        try_files $uri $uri/ /index.html;
    }

    # Cấu hình cache cho các file tĩnh (ảnh, css, js) để web load nhanh hơn
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}