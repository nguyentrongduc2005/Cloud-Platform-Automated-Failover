apiVersion: apps/v1
kind: Deployment
metadata:
  name: apsas-backend
  namespace: __NAMESPACE__
  labels:
    app: apsas-backend
spec:
  replicas: 1
  progressDeadlineSeconds: 1800
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: apsas-backend
  template:
    metadata:
      labels:
        app: apsas-backend
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: apsas-backend
          image: __BACKEND_IMAGE__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: __BACKEND_SECRET__
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          startupProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 150
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 2Gi
