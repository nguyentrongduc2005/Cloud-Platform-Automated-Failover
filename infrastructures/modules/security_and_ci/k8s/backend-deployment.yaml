apiVersion: apps/v1
kind: Deployment
metadata:
  name: apsas-backend
  namespace: __NAMESPACE__
  labels:
    app: apsas-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apsas-backend
  template:
    metadata:
      labels:
        app: apsas-backend
    spec:
      containers:
        - name: apsas-backend
          image: __BACKEND_IMAGE__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: __BACKEND_SECRET__
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
