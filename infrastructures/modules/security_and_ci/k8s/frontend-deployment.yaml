apiVersion: apps/v1
kind: Deployment
metadata:
  name: apsas-frontend
  namespace: __NAMESPACE__
  labels:
    app: apsas-frontend
spec:
  replicas: 1
  progressDeadlineSeconds: 1800
  selector:
    matchLabels:
      app: apsas-frontend
  template:
    metadata:
      labels:
        app: apsas-frontend
    spec:
      containers:
        - name: apsas-frontend
          image: __FRONTEND_IMAGE__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - secretRef:
                name: __FRONTEND_SECRET__
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
